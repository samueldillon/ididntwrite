<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Countdown Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fff; }
    .wrap {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      padding: 1.5rem 1rem;
      background: #fff;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .top-label { font-size: 16px; font-weight: 700; color: #bbb; }
    .title-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.22em;
      text-transform: uppercase; color: #ccc; margin-top: -0.6rem;
    }
    .ring-zone {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: min(72vw, 52vh, 340px);
      height: min(72vw, 52vh, 340px);
    }
    .ring-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }
    .ring-track { fill: none; stroke: #eee; stroke-width: 8; }
    .ring-progress {
      fill: none;
      stroke: #E24B4A;
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.9s linear, stroke 0.3s;
    }
    .ring-progress.urgent { stroke: #A32D2D; }
    .ring-progress.paused { stroke: #ccc; transition: stroke 0.3s; }
    .ring-progress.grace  { stroke: #E24B4A; }
    .btn-outer {
      position: absolute;
      inset: 14px;
      border-radius: 50%;
      background: #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .btn-outer.paused { background: #f5f5f5; }
    .big-btn {
      position: absolute;
      inset: 22px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: #E24B4A;
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: clamp(18px, 6vw, 26px);
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: transform 0.08s, background 0.2s;
      outline: none;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .big-btn:active, .big-btn.pressed { transform: scale(0.93); background: #A32D2D; }
    .big-btn.paused { background: #ccc; }
    .big-btn.grace  { background: #E24B4A; animation: pulse 0.25s ease-in-out infinite alternate; }
    @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.04); } }
    .counter-row { display: flex; align-items: center; gap: 8px; }
    .digit {
      background: #fff; border: 2.5px solid #eee; border-radius: 14px;
      width: 64px; height: 76px; display: flex; align-items: center;
      justify-content: center; font-size: 48px; font-weight: 900;
      color: #E24B4A; transition: color 0.2s, border-color 0.2s;
    }
    .digit.pop { animation: pop 0.18s ease-out; }
    @keyframes pop { 0%{transform:scale(1)} 40%{transform:scale(1.16)} 100%{transform:scale(1)} }
    .digit.urgent { color: #A32D2D; border-color: #F7C1C1; background: #FCEBEB; }
    .digit.done   { color: #ccc; border-color: #eee; background: #fff; }
    .digit.paused { color: #bbb; border-color: #eee; background: #fff; }
    .digit.grace  { color: #E24B4A; border-color: #F7C1C1; background: #FCEBEB; }
    .confetti-bar { display: flex; gap: 7px; align-items: center; justify-content: center; }
    .dot {
      width: 9px; height: 9px; border-radius: 50%; background: #eee;
      transition: background 0.3s; flex-shrink: 0;
    }
    .dot.on { background: #E24B4A; }
    .dot.urgent-dot { background: #A32D2D; }
    .dot.paused-dot { background: #ddd; }
    .hint {
      font-size: 13px; font-weight: 700; color: #ccc;
      letter-spacing: 0.05em; min-height: 18px; transition: color 0.3s;
      text-align: center;
    }
    .hint.active { color: #E24B4A; }
    .hint.paused { color: #bbb; }
    .hint.done { color: #E24B4A; animation: blink 0.5s step-start infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <div class="wrap" id="wrap">
    <div class="top-label">I didn't write...</div>
    <div class="title-label">countdown timer</div>

    <div class="ring-zone">
      <svg class="ring-svg" viewBox="0 0 100 100">
        <circle class="ring-track" cx="50" cy="50" r="46"/>
        <circle class="ring-progress" id="ring" cx="50" cy="50" r="46"/>
      </svg>
      <div class="btn-outer" id="btn-outer">
        <button class="big-btn" id="btn" aria-label="Start or reset the countdown">Press me!</button>
      </div>
    </div>

    <div class="counter-row">
      <div class="digit" id="d0">1</div>
      <div class="digit" id="d1">0</div>
    </div>
    <div class="confetti-bar" id="dots"></div>
    <div class="hint" id="hint">tap anywhere to start</div>
  </div>

  <script>
    const d0 = document.getElementById('d0');
    const d1 = document.getElementById('d1');
    const btn = document.getElementById('btn');
    const btnOuter = document.getElementById('btn-outer');
    const hint = document.getElementById('hint');
    const dotsEl = document.getElementById('dots');
    const wrap = document.getElementById('wrap');
    const ring = document.getElementById('ring');

    const TOTAL = 10;
    const CIRCUMFERENCE = 2 * Math.PI * 46;
    ring.style.strokeDasharray = CIRCUMFERENCE;
    ring.style.strokeDashoffset = '0';

    for (let i = 0; i < 10; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot on';
      dot.id = 'dot' + i;
      dotsEl.appendChild(dot);
    }

    let count = TOTAL, timer = null, audioCtx = null;
    let paused = false, pausedAt = 0;
    let lastTap = 0, tapTimeout = null;
    let wakeLock = null;
    let graceTimeout = null;
    const DOUBLE_TAP_MS = 300;

    async function acquireWakeLock() {
      if ('wakeLock' in navigator) {
        try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
      }
    }
    acquireWakeLock();
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') acquireWakeLock();
    });

    function setRing(fraction, cls) {
      ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - fraction);
      ring.className = 'ring-progress' + (cls ? ' ' + cls : '');
    }

    function setDigits(n, cls) {
      d0.textContent = Math.floor(n / 10);
      d1.textContent = n % 10;
      d0.className = 'digit ' + cls;
      d1.className = 'digit ' + cls;
    }

    function popDigits() {
      [d0, d1].forEach(el => {
        el.classList.remove('pop');
        void el.offsetWidth;
        el.classList.add('pop');
      });
    }

    function updateDots(n, cls) {
      for (let i = 0; i < 10; i++) {
        const dot = document.getElementById('dot' + i);
        dot.className = 'dot' + (i < n ? (' ' + (cls === 'paused' ? 'paused-dot' : n <= 3 ? 'urgent-dot' : 'on')) : '');
      }
    }

    function getAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playTick(urgent) {
      const ctx = getAudio(), now = ctx.currentTime;
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = urgent ? 880 : 660;
      g.gain.setValueAtTime(urgent ? 0.12 : 0.07, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(); osc.stop(now + 0.1);
    }

    function playAlarm() {
      const ctx = getAudio(), now = ctx.currentTime;
      const notes = [523, 659, 784, 1047, 784, 1047, 784, 1047];
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator(), g = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        const t = now + i * 0.13;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.22, t + 0.04);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
        osc.connect(g); g.connect(ctx.destination);
        osc.start(t); osc.stop(t + 0.13);
      });
    }

    function setPausedUI() {
      btn.className = 'big-btn paused';
      btn.textContent = 'Paused';
      btnOuter.className = 'btn-outer paused';
      hint.textContent = 'tap to reset  |  double-tap to resume';
      hint.className = 'hint paused';
      setDigits(count, 'paused');
      updateDots(count, 'paused');
      setRing(count / TOTAL, 'paused');
    }

    function setRunningUI() {
      btn.className = 'big-btn';
      btn.textContent = 'Reset!';
      btnOuter.className = 'btn-outer';
      hint.textContent = 'tap to reset  |  double-tap to pause';
      hint.className = 'hint active';
      const cls = count <= 3 ? 'urgent' : '';
      setDigits(count, cls);
      updateDots(count);
      setRing(count / TOTAL, cls);
    }

    function pauseTimer() {
      if (!timer || paused) return;
      clearInterval(timer);
      timer = null;
      paused = true;
      pausedAt = count;
      setPausedUI();
    }

    function resumeTimer() {
      if (!paused) return;
      paused = false;
      count = pausedAt;
      setRunningUI();
      timer = setInterval(tick, 1000);
    }

    function fireAlarm() {
      btn.className = 'big-btn';
      btn.textContent = 'Again!';
      btnOuter.className = 'btn-outer';
      hint.textContent = 'Times up!';
      hint.className = 'hint done';
      setDigits(0, 'done');
      updateDots(0);
      setRing(0, '');
      playAlarm();
    }

    function tick() {
      count--;
      popDigits();
      if (count > 0) {
        playTick(count <= 3);
        const cls = count <= 3 ? 'urgent' : '';
        setDigits(count, cls);
        updateDots(count);
        setRing(count / TOTAL, cls);
        if (count <= 3) hint.textContent = count === 1 ? 'almost there!' : 'hurry up!';
      } else {
        clearInterval(timer);
        timer = null;
        paused = false;
        setDigits(0, 'grace');
        updateDots(0);
        setRing(0, 'grace');
        btn.className = 'big-btn grace';
        btn.textContent = 'Reset!';
        hint.textContent = '...';
        hint.className = 'hint active';
        graceTimeout = setTimeout(fireAlarm, 500);
      }
    }

    function startCountdown() {
      clearInterval(timer);
      clearTimeout(graceTimeout);
      graceTimeout = null;
      paused = false;
      count = TOTAL;
      btn.className = 'big-btn';
      btnOuter.className = 'btn-outer';
      setDigits(TOTAL, '');
      updateDots(TOTAL);
      ring.style.transition = 'none';
      setRing(1, '');
      setTimeout(() => {
        ring.style.transition = 'stroke-dashoffset 0.9s linear, stroke 0.3s';
      }, 50);
      setRunningUI();
      timer = setInterval(tick, 1000);
    }

    function handleTap(e) {
      e.preventDefault();
      const ctx = getAudio();
      if (ctx.state === 'suspended') ctx.resume();
      const now = Date.now();
      const gap = now - lastTap;
      lastTap = now;
      if (gap < DOUBLE_TAP_MS) {
        clearTimeout(tapTimeout);
        tapTimeout = null;
        if (paused) resumeTimer();
        else if (timer) pauseTimer();
      } else {
        tapTimeout = setTimeout(() => {
          tapTimeout = null;
          btn.classList.add('pressed');
          setTimeout(() => btn.classList.remove('pressed'), 120);
          startCountdown();
        }, DOUBLE_TAP_MS);
      }
    }

    wrap.addEventListener('touchstart', handleTap, { passive: false });
    wrap.addEventListener('click', handleTap);
  </script>
</body>
</html>
